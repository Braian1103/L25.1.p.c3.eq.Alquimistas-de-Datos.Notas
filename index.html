<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <section id="appForm">
    <h3>Aplicación Asistencias</h3>
    <div>
      <h5>Lapso académico: <span id="appForm_lblLapso">?</span></h5>
      <button id="appForm_btCambiarLapso">Cambiar lapso académico</button>
    </div>
    <div style="margin-top: 10px;">
      <button id="appForm_btEstudiantes">Estudiantes</button>
      <button id="appForm_btEvaluaciones">Evaluaciones</button>
      <button id="appForm_btRegistrarExamen">Registrar examen</button>
    </div>
    <table style="margin-top: 10px;">
      <thead>
        <tr>
          <th colspan="4">Exámenes de estudiantes</th>
        </tr>
        <tr>
          <th>Cédula</th>
          <th>Nombre</th>
          <th>Examenes</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="appForm_tabla">
      </tbody>
    </table>
    <table style="margin-top: 10px;">
      <tr>
        <th colspan="3">Reportes varios</th>
      </tr>
      <tr>
        <th><button id="appForm_btEstudiantesCedulaEntre" disabled>Estudiantes<br>cédula entre</button></th>
        <th><button id="appForm_btEvaluacionesConValor" disabled>Evaluaciones<br>con valor</button></th>
        <th><button id="appForm_btEvaluacionesDeCedula" disabled>Evaluaciones<br>de cédula</button></th>
      </tr>
      <tr>
        <th><button id="appForm_btEstudiantesCantidadCedulaEntre">Estudiante<br>cantidad</button></th>
        <th><button id="appForm_btEvaluacionesCantidad">Evaluaciones<br>cantidad</button></th>
      </tr>
    </table>
  </section>
  <section id="examenForm">
    <h3>Registro de examen</h3>
    <input type="text" id="examenForm_inCedula" placeholder="Cédula"></input>
    <input type="text" id="examenForm_inCodigo" placeholder="Código evaluacion"></input>
    <input type="text" id="examenForm_inNota" placeholder="Nota"></input>
    <button id="examenForm_btAceptar">Aceptar</button>
    <button id="examenForm_btCancelar">Cancelar</button>
  </section>
  <section id="estudiantesForm">
    <h3>Estudiantes registrados</h3>
    <p id="estudiantesForm_lblInfo"></p>
    <table>
      <thead>
        <tr>
          <th>Cédula</th>
          <th>Apellido</th>
          <th>Nombre</th>
        </tr>
      </thead>
      <tbody id="estudiantesForm_tabla">
      </tbody>
    </table>
    <br>
    <button id="estudiantesForm_btAgregar">Agregar</button>
    <button id="estudiantesForm_btModificar">Modificar</button>
    <button id="estudiantesForm_btEliminar">Eliminar</button>
    <button id="estudiantesForm_btVolver">Volver</button>
    <br>
    <button id="estudiantesForm_btEvaluaciones" style="margin-top: 10px;">evaluaciones</button>
  </section>
  <section id="estudianteForm">
    <h3>Datos del Estudiante</h3>
    <h3>Estudiante (<span id="estudianteForm_lblRol">???</span>)</h3>
    <input type="text" id="estudianteForm_inCedula" placeholder="Cédula"></input>
    <input type="text" id="estudianteForm_inApellidos" placeholder="Apellidos"></input>
    <input type="text" id="estudianteForm_inNombres" placeholder="Nombres"></input>
    <button id="estudianteForm_btAceptar">Aceptar</button>
    <button id="estudianteForm_btCancelar">Cancelar</button>
  </section>
  <section id="evaluacionesForm">
    <h3>Evaluaciones registradas</h3>
    <p id="evaluacionesForm_lblInfo"></p>
    <table>
      <thead>
        <tr>
          <th>Código</th>
          <th>Nombre</th>
          <th>Valor</th>
        </tr>
      </thead>
      <tbody id="evaluacionesForm_tabla">
      </tbody>
    </table>
    <br>
    <button id="evaluacionesForm_btAgregar">Agregar</button>
    <button id="evaluacionesForm_btModificar">Modificar</button>
    <button id="evaluacionesForm_btVolver">Volver</button>
    <br>
    <button id="evaluacionesForm_btEstudiantes" style="margin-top: 10px;">Estudiantes</button>
  </section>
  <section id="evaluacionForm">
    <h3>evaluacion (<span id="evaluacionForm_lblRol">???</span>)</h3>
    <input type="text" id="evaluacionForm_inCodigo" placeholder="Código"></input>
    <input type="text" id="evaluacionForm_inNombre" placeholder="Nombre"></input>
    <input type="text" id="evaluacionForm_inValor" placeholder="Valor"></input>
    <button id="evaluacionForm_btAceptar">Aceptar</button>
    <button id="evaluacionForm_btCancelar">Cancelar</button>
  </section>
</body>
<script type="module">
  import Cl_principal from "./principal.js";
  new Cl_principal()
</script>

</html>
